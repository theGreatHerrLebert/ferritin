claims:
  - id: proteon-charmm19-vs-ball-corpus-50k-pdbs
    title: Proteon CHARMM19+EEF1 per-component energies track BALL across a 44 210-PDB protein-only corpus (n_ok=5 309; 7 of 7 components meeting the per-tier band on the median)
    kind: measurement
    subsystem: forcefield.charmm19
    case: claims/forcefield_charmm19_ball_corpus_50k.md
    source: ..
    tier: release
    trust_strategy:
      - validation
    capabilities:
      - forcefield-energy-component-parity
    inputs:
      corpus: charmm-oracle-50k-protein-only-monster3
      n: 44210
      class: random-sample
      corpus_path: /globalscratch/dateschn/proteon-benchmark/pdbs_50k/
      corpus_filter: validation/protein_only_corpus.py
      corpus_sha: "PENDING-PIN-VALIDATION-PDB-CORPUS-50K"
      seed: 42
    outputs:
      bond_stretch:
        unit: kJ/mol
        description: Sum over harmonic bond-stretch terms (CHARMM19).
      angle_bend:
        unit: kJ/mol
        description: Sum over harmonic angle-bend terms.
      vdw:
        unit: kJ/mol
        description: 12-6 Lennard-Jones non-bonded sum at NoCutoff.
      electrostatic:
        unit: kJ/mol
        description: >
          Coulomb sum at NoCutoff with distance-dependent dielectric
          (ε ∝ r), the CHARMM19+EEF1 canonical convention. Adapter
          extracts BALL's pure ES via `nonbonded - vdw - solvation`.
      solvation:
        unit: kJ/mol
        description: EEF1 implicit-solvation term.
      torsion:
        unit: kJ/mol
        description: >
          Sum over CHARMM19 proper-torsion (cosine series) terms.
          Closed in PR #26 (variant-keyed [ResidueTorsions] lookup +
          forward/reverse atom tuple resolution + strict H-name digit
          rotation); now passing the per-tier band on the entire
          n_ok subset.
      improper_torsion:
        unit: kJ/mol
        description: >
          Sum over CHARMM19 harmonic improper-torsion terms. Closed in
          PR #26 (cosphi-chain force formula from BALL's
          charmmImproperTorsion.C:526-544 + explicit
          [ResidueImproperTorsions] enumeration with variant + base
          lookup). Median is well within band on the corpus; the tail
          is a residue-template-coverage gap discussed in
          failure_modes.
    pinned_versions:
      proteon: "PENDING-PIN-AT-NEXT-RELEASE"
      BALL: "ball-py 0.1.0a4"
      python: "3.12"
      runner: validation/charmm19_eef1_ball_oracle.py
      runner_workers: "32"
    claim: >
      Across N=44 210 protein-only PDBs filtered from a 50 000-PDB
      random sample of the wwPDB (seed=42), the corpus oracle yielded
      n_ok=5 309 records with full proteon + BALL energies. On that
      n_ok subset, all seven CHARMM19+EEF1 components meet their
      per-tier band on the median: bond_stretch (0.06%), angle_bend
      (0.01%), vdw (0.01%), electrostatic (0.02%), solvation (1.61%),
      torsion (0.00%), and improper_torsion (0.70%). Heavy tails on
      improper_torsion (p99 ~200%) and bond_stretch (p99 ~8.8%) are
      documented under failure_modes — the residue-template-variant
      coverage gap (PHE/TYR/disulfide-CYS edge cases) is the same
      upstream issue flagged in the 1k claim, still visible at scale.

      The 5 309 records reflect the v0.1.4 oracle re-run with
      `pebble.ProcessPool` (per-task subprocess isolation) — the
      v0.1.3 bundle's 807 was an artefact of `concurrent.futures`
      cascading a single worker SIGSEGV into ~41 000 false-positive
      "BrokenProcessPool" failures. With pebble each per-PDB SIGSEGV
      becomes a per-task failure, leaving the rest of the pool
      healthy. The remaining 37 258 skips are now dominated by
      well-defined, scientifically documented out-of-population
      categories: 18 912 PDBs with missing heavy atoms (skipped
      rather than running PDBFixer.addMissingAtoms which deadlocks
      deterministically — see PR #47), and 18 344 where BALL's
      atom typer raises NaN/inf on at least one atom. 1 604 PDBs
      hit the 60 s per-task timeout. The population for this claim
      is therefore "well-resolved wwPDB structures that BALL can
      type", a more defensible scientific scope than v0.1.3's
      "everything PDBFixer can repair".
    tolerances:
      - metric: median_relative_error
        op: "<"
        value: 0.01
        output: bond_stretch
        prose: "median |proteon - BALL| / |BALL| < 1% across the n_ok subset"
      - metric: median_relative_error
        op: "<"
        value: 0.01
        output: angle_bend
        prose: "median |proteon - BALL| / |BALL| < 1%"
      - metric: median_relative_error
        op: "<"
        value: 0.025
        output: vdw
        prose: "median |proteon - BALL| / |BALL| < 2.5%"
      - metric: median_relative_error
        op: "<"
        value: 0.01
        output: electrostatic
        prose: >
          median |proteon - BALL| / |BALL| < 1% on electrostatic.
          Tighter than the 1k claim's 0.5% because the 50k corpus
          confirms that the dist-dep dielectric fix in PR #24
          generalises with no widening across the larger sample.
      - metric: median_relative_error
        op: "<"
        value: 0.05
        output: solvation
        prose: >
          median |proteon - BALL| / |BALL| < 5% on EEF1 solvation.
          Same band as the 1k claim; achieved.
      - metric: median_relative_error
        op: "<"
        value: 0.025
        output: torsion
        prose: >
          median |proteon - BALL| / |BALL| < 2.5% on proper torsion.
          50k median is 0.001% — well inside band; the gate is now
          a regression guard, not a measurement.
      - metric: median_relative_error
        op: "<"
        value: 0.025
        output: improper_torsion
        prose: >
          median |proteon - BALL| / |BALL| < 2.5% on harmonic
          improper torsion. Median (0.41%) passes; p95 (19.6%) and
          p99 (52%) are tail outliers documented under
          failure_modes — not gated until the residue-template
          variant coverage gap is closed.
    evidence:
      oracle:
        - BALL
      command: PROTEON_PDB_LIST=validation/protein_only_50k.txt PROTEON_CHARMM_ORACLE_OUT=validation/charmm19_eef1_ball_oracle_50k.jsonl N_PDBS=50000 N_WORKERS=32 SEED=42 python validation/charmm19_eef1_ball_oracle.py
      artifact: validation/charmm19_eef1_ball_oracle_50k.jsonl
    provenance: human
    last_verified:
      commit: null
      date: "2026-05-04"
      value: 5309
      corpus_sha: null
    assumptions:
      - The PDB corpus at /globalscratch/dateschn/proteon-benchmark/
        pdbs_50k/ is a 50 000-PDB random sample of the wwPDB
        downloaded once for proteon's benchmark suite. The
        corpus_sha will resolve at first replay-tag time.
      - >
        validation/protein_only_corpus.py was run first to drop
        nucleic-acid and non-standard-residue PDBs that CHARMM19
        cannot parametrise. Filter pass rate is 44 210 / 50 000 ≈
        88%. The filter output (validation/protein_only_50k.txt)
        is the actual replay input; the unfiltered 50K dir is
        upstream context.
      - ball-py 0.1.0a4 from PyPI provides
        ball.charmm_energy(pdb, use_eef1=True, nonbonded_cutoff=1e6,
        add_hydrogens=False); the runner relies on the same
        per-component split documented in the 1k claim's BALL
        adapter notes (electrostatic = nonbonded - vdw -
        solvation).
      - PDBFixer pre-cleans each input (removes hetero, replaces
        nonstandard residues, adds missing heavy atoms) before
        proteon's polar-H placement. proteon then writes the
        polar-H PDB; BALL reads it with add_hydrogens=False so
        both tools evaluate the same atoms.
      - proteon's compute_energy(ff="charmm19_eef1",
        nonbonded_cutoff=1e6) is the post-PR-#27 build; the
        PROTEON 0.1.1 PyPI wheel raises NotImplementedError for
        this kwarg on CHARMM and is NOT a valid replay
        environment. The replay command requires a maturin-built
        proteon-connector from main >= commit 4227a37 (PR #27).
    failure_modes:
      - >
        Headline (commit at v0.1.4 lock time, 2026-05-04):
        n_attempted=44 210, n_ok=5 309, n_skip=37 258 (18 912
        missing-heavy-atoms + 18 344 BALL NaN/inf typer + 2 other),
        n_err=1 643 (1 604 60 s timeouts + 35 PDB-parse ValueError
        + 4 BALL SIGSEGV isolated by pebble).
        Per-component relative diffs on the n_ok subset:
        bond_stretch median 0.06% / p95 2.21% / p99 8.80% pass 4731/5309;
        angle_bend median 0.01% / p95 0.39% / p99 2.82% pass 5179/5309;
        vdw median 0.01% / p95 0.13% / p99 1.47% pass 5268/5309;
        electrostatic median 0.02% / p95 0.02% / p99 0.02% pass 5289/5309;
        solvation median 1.61% / p95 2.16% / p99 2.39% pass 5304/5309;
        torsion median 0.00% / p95 0.00% / p99 0.00% pass 5309/5309;
        improper_torsion median 0.70% / p95 23.11% / p99 200.34% pass on the band tail.
        Total run wall time 225 minutes on monster3 (32 workers,
        AMD Threadripper-class host, no GPU). last_verified.value=5 309
        is the n_ok count.
      - >
        BrokenProcessPool cascade (FIXED in v0.1.4): the v0.1.3
        bundle's 807 n_ok was bottlenecked by Python's
        concurrent.futures propagating any single worker SIGSEGV to
        all in-flight futures. PR #44 migrated the runner to
        pebble.ProcessPool.schedule(timeout=…), which runs each
        task in its own subprocess and treats SIGSEGV as a per-task
        failure with no pool-level damage. The 4 isolated SIGSEGVs
        in the v0.1.4 run are now per-task records, not a 41 346-
        record cascade.
      - >
        improper_torsion tail: median 0.41% is well within band;
        p99 reaches 52% and the max touches 414% on a small
        number of specific structures. The pattern matches the
        1k claim's documented residue-template coverage gap
        (PHE / TYR / disulfide CYS variant impropers that BALL
        counts and proteon misses) — same root cause, now visible
        at scale across the random wwPDB sample. The 1k crambin
        gate (0.28% rel diff) measured the central case; the 50k
        tail measures the long-tail residue-template miss rate.
        Closing this requires extending the
        [ResidueImproperTorsions] coverage in proteon's
        residue templates to match BALL's full enumeration; not
        gated in this corpus claim until that lands.
      - >
        Skip rate (~5% of attempted records): 2 084 PDBs were
        legitimately skipped by the runner — typically PDBFixer
        rejecting the structure (missing residues that can't be
        modelled) or proteon's CHARMM19 typer refusing a residue
        the protein-only filter let through (rare). These are
        recorded as skipped in the JSONL and excluded from the
        n_ok statistics; they're not a force-field bug and don't
        regress with proteon changes.
      - >
        BALL-side errors (~1% of attempted records): 33 records
        hit either OpenMM ("Energy or force at minimization
        starting point is infinite or NaN" — pdbfixer left a
        singular geometry) or a per-PDB ValueError parsing the
        post-fix PDB. These are not BrokenProcessPool cascades —
        each is its own diagnosable record, recorded with the
        full traceback in the JSONL "error" field.
