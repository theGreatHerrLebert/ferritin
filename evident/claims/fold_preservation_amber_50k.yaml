claims:
  - id: proteon-amber96-fold-preservation-vs-openmm-release-50k-pdbs
    title: Proteon AMBER96 minimization preserves fold within 0.005 TM-score of OpenMM AMBER96 across 50 000 random PDBs (PENDING — first run scheduled)
    kind: measurement
    subsystem: minimize
    case: claims/fold_preservation_amber_50k.md
    source: ..
    tier: release
    trust_strategy:
      - validation
    capabilities:
      - fold-preservation-after-minimization
    inputs:
      corpus: amber-fold-preservation-50k-from-validation-pdbs
      n: 50000
      class: random-sample
      seed: 42
      corpus_sha: "PENDING-PIN-VALIDATION-PDB-CORPUS-50K"
    outputs:
      tm_score:
        unit: dimensionless
        description: TM-score between input PDB CA trace and post-minimization CA trace. Same TM-score function on both arms, so the comparison is on the physics, not on alignment idiosyncrasies.
      rmsd:
        unit: angstroms
        description: Heavy-atom RMSD between input and post-minimization structures (Kabsch-aligned).
      tm_diff:
        unit: dimensionless
        description: Per-PDB difference openmm.tm_score − proteon.tm_score. Claim's tolerance bounds the median magnitude.
    pinned_versions:
      proteon: "PENDING-PIN-AT-NEXT-RELEASE"
      OpenMM: "8.5.1"
      python: "3.12"
      runner_proteon: validation/tm_fold_preservation_amber.py
      runner_openmm: validation/tm_fold_preservation_openmm_amber.py
      joiner: validation/fold_preservation/join_fold_preservation.py
    claim: >
      Across 50 000 PDBs sampled (seed=42) from the wwPDB random sample,
      proteon's AMBER96 minimization preserves fold within 0.005 TM-score
      of OpenMM's AMBER96 minimization on the same inputs. This is the
      cleanest cross-implementation force-field oracle proteon ships at
      50K scale — both sides claim "AMBER96", so the diff is purely
      implementation, not parameter set. The 1k version shipped in v0.1.4
      with median(openmm − proteon) tm_diff = +0.0028 (proteon AMBER96
      median TM=0.9959, OpenMM AMBER96 median TM=0.9992). This 50K
      extension confirms the agreement holds at full corpus scale.
      First 50K run scheduled; headline numbers will be filled in at lock
      time.
    tolerances:
      - metric: pass_rate
        op: ">="
        value: 0.5
        output: tm_score
        prose: >
          ≥50% of n_ok structures retain TM-score > 0.99 after 100
          minimizer steps. Fold preservation at population scale.
      - metric: drift
        op: "<"
        value: 0.01
        output: tm_diff
        prose: >
          |median(openmm.tm_score − proteon.tm_score)| < 0.01 — the
          tightest bound across proteon's release-tier oracle claims at
          50K scale, since both arms claim the same parameter set. The
          1k headline of +0.0028 is well inside this band; the 50K
          extension confirms it doesn't drift at scale.
      - metric: pass_rate
        op: ">="
        value: 0.85
        output: tm_score
        prose: >
          n_ok / n_attempted ≥ 0.85 to claim "across the corpus".
          Same threshold as the 1k claim (which cleared 86.4%).
    evidence:
      oracle:
        - OpenMM
      command: >
        N_PDBS=50000 PROTEON_OUTPUT_DIR=validation/fold_preservation_50k python validation/tm_fold_preservation_amber.py &&
        N_PDBS=50000 PROTEON_OUTPUT_DIR=validation/fold_preservation_50k python validation/tm_fold_preservation_openmm_amber.py &&
        PROTEON_OUTPUT_DIR=validation/fold_preservation_50k python validation/fold_preservation/join_fold_preservation.py
      artifact: validation/fold_preservation_50k/amber_pair_1k.jsonl
    provenance: human
    last_verified:
      commit: null
      date: null
      value: null
      corpus_sha: null
    assumptions:
      - Both arms claim AMBER96 with the same nonbonded cutoff (NoCutoff
        for the openmm-side, matching proteon's AMBER96 oracle policy).
        The TM-score diff captures pure implementation drift, not
        parameter-set divergence.
      - proteon's AMBER96 implementation uses all-atom prep (place all
        hydrogens, including non-polar) to match the parameter set's
        atom typing. OpenMM AMBER96 uses ff14SB conventions natively.
        Both consume the same PDBFixer-preprocessed input.
      - Minimizer budget 100 steps on both sides. Neither runs to
        convergence; the metric is fold survival, not minimum-finding.
      - TM-score is computed by proteon's TM-align port on both arms,
        so the alignment is shared and the diff isolates the physics.
    failure_modes:
      - >
          Headline (PENDING) n_attempted, n_ok, pass_rate, per-side
          median TM, tm_diff distribution. Will be filled at first lock.
      - >
          The artifact path is the joiner's output; the per-side JSONLs
          (tm_fold_preservation_amber.jsonl,
          tm_fold_preservation_openmm_amber.jsonl) are also under
          PROTEON_OUTPUT_DIR but aren't sha256-pinned by the manifest.
      - >
          AMBER96 is not proteon's production-default force field
          (CHARMM19+EEF1 is). This claim is the cleanest implementation
          oracle proteon has at 50K scale — both arms claim AMBER96 — but
          it does NOT extend to "proteon's CHARMM19+EEF1 implementation is
          correct"; that claim is carried by the corpus oracle
          (charmm19-vs-ball-corpus-50k) and the per-component CI gate.
