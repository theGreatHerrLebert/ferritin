[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ferritin"
version = "0.1.0"
description = "Structural bioinformatics toolkit powered by Rust"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "ferritin-connector>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]
