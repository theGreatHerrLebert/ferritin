name: EVIDENT image

# Builds the proteon-evident reproducibility image and pushes it to GHCR.
# The image bundles proteon + the oracle stack that backs the claims in
# proteon/evident/evident.yaml, plus the `evident` CLI for manifest
# validation and listing.
#
# Triggers:
#   - push to main (pushes :main tag for fresh consumers)
#   - tag push v* (pushes :<version> + :latest, paired with releases)
#   - manual workflow_dispatch (push :dispatch-<run> for ad-hoc replay)

on:
  push:
    branches: [main]
    tags: ["v*"]
  # On PRs that touch the image surface, build-only (no GHCR push, no
  # smoke pull). Catches Dockerfile / workflow regressions before they
  # reach main, without needing GHCR write permissions on a fork.
  pull_request:
    paths:
      - "evident/Dockerfile"
      - "evident/tools/**"
      - "evident/evident.yaml"
      - "evident/claims/**"
      - ".github/workflows/evident-image.yml"
      - ".dockerignore"
  workflow_dispatch:

# GHCR push needs `packages: write`; the image links to the repo via
# `org.opencontainers.image.source` so the package inherits the repo's
# visibility automatically.
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push proteon-evident
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate EVIDENT manifest before building image
        run: |
          python3 -m pip install --quiet pyyaml
          python3 evident/tools/validate_manifest.py evident/evident.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Skip on pull_request — fork PRs don't have package:write
        # against the upstream registry. Build-only PRs don't need it.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          # GHCR demands lowercase repo paths.
          IMAGE_BASE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/proteon-evident"
          TAGS="${IMAGE_BASE}:sha-${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${IMAGE_BASE}:${VERSION},${IMAGE_BASE}:latest"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS="${TAGS},${IMAGE_BASE}:main"
          else
            TAGS="${TAGS},${IMAGE_BASE}:dispatch-${GITHUB_RUN_ID}"
          fi
          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"
          echo "Tags: ${TAGS}"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: evident/Dockerfile
          # PRs validate the build only; main / tag / dispatch push.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          # Inline cache for repeat builds; the Rust + oracle layers
          # change far less often than the proteon source.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Annotate the image with the source SHA so a reviewer can
          # walk back from the GHCR digest to the producing commit
          # without consulting the workflow run.
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Smoke-test pulled image
        # Skipped on pull_request because no image was pushed.
        # Confirms the manifest still validates from inside the image,
        # so a build that breaks evident at runtime is caught before
        # the image is consumed downstream.
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_BASE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/proteon-evident"
          TAG="sha-${GITHUB_SHA::7}"
          docker pull "${IMAGE_BASE}:${TAG}"
          docker run --rm "${IMAGE_BASE}:${TAG}" validate evident/evident.yaml
          docker run --rm "${IMAGE_BASE}:${TAG}" list evident/evident.yaml
